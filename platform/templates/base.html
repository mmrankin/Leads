<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Platform Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a href="{{ url_for('index') }}" class="brand">Dealer Platform · Admin</a>
        <nav class="topnav">
            <a href="{{ url_for('index') }}">Dealers</a>
            <a href="{{ url_for('leads') }}">Leads</a>
        </nav>
    </header>
    <main class="container container--wide">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="alert {{ 'alert--ok' if cat == 'ok' else '' }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
